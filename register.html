<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Registro</title>
  </head>

  <body class="own-container register-body">
    <header class="mobile logo">
      <img src="images/logo_horizontal.png" alt="logo mobile" />
      <p>Únete a la red de conocimiento</p>
    </header>

    <section class="desktop-logo logo">
      <img src="images/logo_vertical.png" alt="logo desktop" />
    </section>

    <main>
      <section class="register">
        <div class="user-avatar-default-container">
          <img
            src="images/user-solid.png"
            class="profile-avatar user-avatar-default"
            alt="avatar"
          />
          <i class="fa-solid fa-pencil user-avatar-pencil"></i>
        </div>

        <form id="loginForm" action="" method="post">
          <input
            class="input-group register-input-text-color"
            type="text"
            placeholder="Nombre"
          />

          <input
            class="input-group register-input-text-color"
            type="text"
            placeholder="Apellido"
          />

          <input
            class="input-group register-input-text-color"
            type="text"
            placeholder="Nombre de usuario"
          />

          <input
            class="input-group register-input-text-color"
            type="text"
            placeholder="Correo electrónico"
          />

          <div class="input-group">
            <input type="password" placeholder="Contraseña" />
            <i class="fa-solid fa-eye"></i>
          </div>

          <div class="input-group">
            <input type="password" placeholder="Confirmar contraseña" />
            <i class="fa-solid fa-eye"></i>
          </div>

          <div class="terms-and-conditions-button-group">
            <a
              class="button-submit terms-and-conditions-button"
              href="terms-and-conditions.html"
            >
              Leer términos y condiciones
            </a>

            <button
              class="button-submit button-disabled terms-and-conditions-button"
              type="submit"
              disabled
            >
              REGÍSTRATE
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>

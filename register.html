<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css" />
    <title>Registro</title>
  </head>
  <body class="own-container">
     <header class="mobile logo">
        <img src="images/logo_horizontal.png" alt="logo mobile" />
        <p>Únete a la red de conocimiento</p>
      </header>
      <main>
     
      <section class="desktop-logo logo">
        <img src="images/logo_vertical.png" alt="logo desktop" />
      </section>
      <section class="register">
          <div>
            <img src="" alt="avatar" />
            <i class="fa-solid fa-pencil"></i>
          </div>
          <form id="loginForm" action="" method="post">
            <input class="input-group register-input-text-color" type="text" placeholder="Nombre" />
            <input class="input-group register-input-text-color" type="text" placeholder="Apellido" />
            <input class="input-group register-input-text-color" type="text" placeholder="Correo electrónico" />
            <div class="input-group">
              <input type="text" placeholder="Contraseña" />
              <i class="fa-solid fa-eye"></i>
            </div>
            <div class="input-group">
              <input type="text" placeholder="Confirmar contraseña" />
              <i class="fa-solid fa-eye"></i>
            </div>
            <div>
              <a class="button-submit" href="terms-and-conditions.html">Leer términos y condiciones</a>
              <button class="button-submit button-disabled" type="submit" value="Submit" disabled="true">REGISTRATE</button>
            </div>
          </form>

      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Registro</title>
  </head>
  <body>
    <main class="container">
      <header class="mobile logo">
        <img src="images/logo_horizontal.png" alt="logo mobile" />
        <p>Únete a la red de conocimiento</p>
      </header>
      <section class="desktop-logo logo">
        <img src="images/logo_vertical.png" alt="logo desktop" />
      </section>
      <section class="register">
          <div>
            <img src="" alt="avatar" />
            <i class="fa-solid fa-pencil"></i>
          </div>
          <form action="" method="post">
            <input type="text" placeholder="Nombre" />
            <input type="text" placeholder="Apellido" />
            <input type="text" placeholder="Correo electrónico" />
            <div>
              <input type="text" placeholder="Contraseña" />
              <i class="fa-solid fa-eye"></i>
            </div>
            <div>
              <input type="text" placeholder="Confirmar contraseña" />
              <i class="fa-solid fa-eye"></i>
            </div>
            <div>
              <a href="terms-and-conditions.html">Leer términos y condiciones</a>
              <button type="submit" value="Submit">REGISTRATE</button>
            </div>
          </form>

      </section class="register">
    </main>
  </body>
</html>
